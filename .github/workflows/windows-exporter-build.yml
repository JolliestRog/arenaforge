name: Build Windows Exporter

on:
  workflow_dispatch:
  push:
    paths:
      - "exporter/**"
      - ".github/workflows/windows-exporter-build.yml"

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: exporter

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

      - name: Build executable
        run: pyinstaller ArenaForge-MTGA-Exporter.spec --noconfirm --clean

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ArenaForge-MTGA-Exporter
          path: exporter/dist/ArenaForge-MTGA-Exporter.exe
